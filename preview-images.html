<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appliance Images Preview - All Brands</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
        h1 { text-align: center; color: #0033A0; margin-bottom: 10px; }
        .stats { text-align: center; color: #666; margin-bottom: 30px; }
        .brand-section { background: white; border-radius: 12px; padding: 20px; margin-bottom: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .brand-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid #0033A0; padding-bottom: 10px; }
        .brand-name { font-size: 24px; font-weight: bold; color: #0033A0; text-transform: capitalize; }
        .brand-count { background: #0033A0; color: white; padding: 4px 12px; border-radius: 20px; font-size: 14px; }
        .appliance-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 15px; }
        .appliance-card { text-align: center; background: #fafafa; border-radius: 8px; padding: 10px; border: 1px solid #eee; }
        .appliance-card img { width: 100%; height: 120px; object-fit: contain; background: white; border-radius: 4px; }
        .appliance-card .label { font-size: 12px; color: #666; margin-top: 8px; text-transform: capitalize; }
        .appliance-card.error img { border: 2px solid #c41e3a; }
        .appliance-card.error .label { color: #c41e3a; }
        .filter-bar { position: sticky; top: 0; background: white; padding: 15px; margin: -20px -20px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); z-index: 100; display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        .filter-bar input { padding: 10px 15px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; width: 300px; }
        .filter-bar button { padding: 10px 20px; background: #0033A0; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .filter-bar button:hover { background: #002580; }
        @media (max-width: 1200px) { .appliance-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 600px) { .appliance-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <div class="filter-bar">
        <input type="text" id="search" placeholder="Search brands (e.g., samsung, lg, whirlpool)..." oninput="filterBrands()">
        <button onclick="showAll()">Show All</button>
        <button onclick="showErrors()">Show Missing Only</button>
    </div>
    
    <h1>Appliance Images Preview</h1>
    <div class="stats" id="stats">Loading...</div>
    
    <div id="brands-container"></div>

    <script>
        const appliances = ['washer', 'dryer', 'dishwasher', 'microwave', 'oven', 'cooktop', 'refrigerator', 'hood'];
        const brands = [
            'admiral', 'amana', 'american-range', 'asko', 'beko', 'bertazzoni', 'big-chill', 'blomberg',
            'blue-star', 'bosch', 'broan', 'cafe', 'capital', 'cove', 'dacor', 'dcs', 'electrolux',
            'elmira-stove-works', 'estate', 'eurotech', 'faber', 'fisher-paykel', 'five-star', 
            'forza', 'frigidaire', 'fulgor-milano', 'gaggenau', 'ge', 'haier', 'hardwick', 'hestan',
            'hisense', 'hotpoint', 'ikea', 'ilve', 'inglis', 'insignia', 'jenn-air', 'kenmore',
            'kitchenaid', 'kobe', 'la-cornue', 'lg', 'liebherr', 'lynx', 'magic-chef', 'marvel',
            'maytag', 'miele', 'modern-maid', 'moffat', 'monogram', 'northland-refrigeration',
            'panasonic', 'panda', 'porter-charles', 'premier', 'roper', 'samsung', 'sharp',
            'signature-kitchen-suite', 'sirius', 'smeg', 'speedqueen', 'subzero', 'summit',
            'tappan', 'thermador', 'thor-kitchen', 'true-residential', 'venmar', 'vent-a-hood',
            'viking', 'wascomat', 'westinghouse', 'whirlpool', 'wolf', 'zline'
        ];

        let errorCount = 0;
        let showOnlyErrors = false;

        function formatBrandName(brand) {
            const special = {
                'lg': 'LG', 'ge': 'GE', 'dcs': 'DCS', 'aeg': 'AEG',
                'subzero': 'Sub-Zero', 'kitchenaid': 'KitchenAid', 
                'jenn-air': 'JennAir', 'fisher-paykel': 'Fisher & Paykel'
            };
            return special[brand] || brand.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        }

        function createBrandSection(brand) {
            const section = document.createElement('div');
            section.className = 'brand-section';
            section.dataset.brand = brand;
            
            let hasError = false;
            let applianceHtml = '';
            
            appliances.forEach(appliance => {
                const imgSrc = `/assets/images/appliances/${brand}-${appliance}.webp`;
                applianceHtml += `
                    <div class="appliance-card" data-appliance="${appliance}">
                        <img src="${imgSrc}" alt="${brand} ${appliance}" 
                             onerror="this.parentElement.classList.add('error'); this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22><rect fill=%22%23ffeeee%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%23c41e3a%22 font-size=%2212%22>Missing</text></svg>'; window.errorCount = (window.errorCount || 0) + 1; updateStats();">
                        <div class="label">${appliance}</div>
                    </div>
                `;
            });
            
            section.innerHTML = `
                <div class="brand-header">
                    <span class="brand-name">${formatBrandName(brand)}</span>
                    <span class="brand-count">8 appliances</span>
                </div>
                <div class="appliance-grid">${applianceHtml}</div>
            `;
            
            return section;
        }

        function updateStats() {
            const total = brands.length * appliances.length;
            const errors = window.errorCount || 0;
            document.getElementById('stats').textContent = 
                `${brands.length} brands × ${appliances.length} appliances = ${total} images | ${errors} missing`;
        }

        function filterBrands() {
            const search = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.brand-section').forEach(section => {
                const brand = section.dataset.brand;
                const matches = brand.includes(search) || formatBrandName(brand).toLowerCase().includes(search);
                section.style.display = matches ? 'block' : 'none';
            });
        }

        function showAll() {
            showOnlyErrors = false;
            document.querySelectorAll('.brand-section').forEach(s => s.style.display = 'block');
            document.getElementById('search').value = '';
        }

        function showErrors() {
            showOnlyErrors = true;
            document.querySelectorAll('.brand-section').forEach(section => {
                const hasError = section.querySelector('.appliance-card.error');
                section.style.display = hasError ? 'block' : 'none';
            });
        }

        // Initialize
        const container = document.getElementById('brands-container');
        brands.forEach(brand => container.appendChild(createBrandSection(brand)));
        updateStats();
    </script>
</body>
</html>
